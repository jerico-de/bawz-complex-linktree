<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bawz Complex</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="grid-bg"></div>

    <main>
        <div id="site-root" style="display:contents"></div>
    </main>

    <!-- ── Gallery Modal (replaces old single-image modal) ── -->
    <div id="gallery-modal" class="gallery-modal" role="dialog" aria-modal="true" aria-label="Image viewer">
      <div class="gallery-modal-inner">
        <button class="gallery-close" id="gallery-close" aria-label="Close">&times;</button>

        <div class="gallery-track-wrap">
          <div class="gallery-track" id="gallery-track"></div>
          <button class="gallery-arrow gallery-arrow--prev hidden" id="gallery-prev" aria-label="Previous">&#8249;</button>
          <button class="gallery-arrow gallery-arrow--next hidden" id="gallery-next" aria-label="Next">&#8250;</button>
        </div>

        <div class="gallery-dots" id="gallery-dots"></div>
        <div class="gallery-counter" id="gallery-counter"></div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">Link copied!</div>

    <script>
    // ══════════════════════════════════════════════════════
    //  SOCIAL ICONS SVG MAP
    // ══════════════════════════════════════════════════════
    const SOCIAL_ICONS = {
      instagram: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>`,
      facebook:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>`,
      tiktok:    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg>`,
      email:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>`,
    };

    // ══════════════════════════════════════════════════════
    //  GALLERY STATE & LOGIC
    // ══════════════════════════════════════════════════════
    const Gallery = (() => {
      let images  = [];
      let current = 0;
      let touchStartX = 0;
      let touchStartY = 0;
      let isDragging  = false;

      const modal   = document.getElementById('gallery-modal');
      const track   = document.getElementById('gallery-track');
      const dotsWrap= document.getElementById('gallery-dots');
      const counter = document.getElementById('gallery-counter');
      const prevBtn = document.getElementById('gallery-prev');
      const nextBtn = document.getElementById('gallery-next');
      const closeBtn= document.getElementById('gallery-close');

      function open(imgArray, startIndex = 0) {
        images  = imgArray;
        current = startIndex;

        // Single-image flag
        modal.dataset.single = images.length === 1 ? 'true' : 'false';

        // Build slides
        track.innerHTML = '';
        images.forEach((src, i) => {
          const slide = document.createElement('div');
          slide.className = 'gallery-slide';
          const img = document.createElement('img');
          img.src = src;
          img.alt = `Image ${i + 1}`;
          img.loading = 'lazy';
          slide.appendChild(img);
          track.appendChild(slide);
        });

        // Build dots
        dotsWrap.innerHTML = '';
        images.forEach((_, i) => {
          const dot = document.createElement('button');
          dot.className = 'gallery-dot' + (i === current ? ' active' : '');
          dot.setAttribute('aria-label', `Go to image ${i + 1}`);
          dot.addEventListener('click', () => goTo(i));
          dotsWrap.appendChild(dot);
        });

        goTo(current, false);
        modal.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function close() {
        modal.classList.remove('open');
        document.body.style.overflow = '';
      }

      function goTo(index, animate = true) {
        current = Math.max(0, Math.min(index, images.length - 1));
        if (!animate) track.style.transition = 'none';
        track.style.transform = `translateX(-${current * 100}%)`;
        if (!animate) requestAnimationFrame(() => track.style.transition = '');

        // Dots
        dotsWrap.querySelectorAll('.gallery-dot').forEach((d, i) => {
          d.classList.toggle('active', i === current);
        });

        // Counter
        counter.textContent = images.length > 1 ? `${current + 1} / ${images.length}` : '';

        // Arrows
        prevBtn.classList.toggle('hidden', current === 0);
        nextBtn.classList.toggle('hidden', current === images.length - 1);
      }

      function prev() { goTo(current - 1); }
      function next() { goTo(current + 1); }

      // Button listeners
      prevBtn.addEventListener('click', prev);
      nextBtn.addEventListener('click', next);
      closeBtn.addEventListener('click', close);
      modal.addEventListener('click', e => { if (e.target === modal) close(); });

      // Keyboard
      document.addEventListener('keydown', e => {
        if (!modal.classList.contains('open')) return;
        if (e.key === 'Escape')     close();
        if (e.key === 'ArrowLeft')  prev();
        if (e.key === 'ArrowRight') next();
      });

      // Touch swipe
      track.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        isDragging  = false;
      }, { passive: true });

      track.addEventListener('touchmove', e => {
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy)) isDragging = true;
      }, { passive: true });

      track.addEventListener('touchend', e => {
        if (!isDragging) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (dx < -40)      next();
        else if (dx > 40)  prev();
        isDragging = false;
      });

      // Mouse drag (desktop)
      let mouseStartX = 0, mouseDragging = false;
      track.addEventListener('mousedown', e => { mouseStartX = e.clientX; mouseDragging = true; });
      track.addEventListener('mousemove', e => { if (mouseDragging) e.preventDefault(); });
      track.addEventListener('mouseup',   e => {
        if (!mouseDragging) return;
        const dx = e.clientX - mouseStartX;
        if (dx < -40)     next();
        else if (dx > 40) prev();
        mouseDragging = false;
      });
      track.addEventListener('mouseleave', () => { mouseDragging = false; });

      return { open, close };
    })();

    // ══════════════════════════════════════════════════════
    //  RENDER
    // ══════════════════════════════════════════════════════
    function buildSite(cfg) {
      const root = document.getElementById('site-root');
      root.innerHTML = '';

      // ── Hero ──
      const hero = document.createElement('header');
      hero.className = 'hero';
      const taglineLines = (cfg.tagline || '').replace(/\\n/g, '\n').split('\n');
      hero.innerHTML = `
        <div class="logo-wrap">
          <div class="logo-box">
            <img src="https://res.cloudinary.com/dqlp2jeog/image/upload/v1782155448/FLAT_BAWZ_WHITE_om0hhd.png" alt="Bawz Complex Logo" class="logo-img" id="logo-img">
          </div>
        </div>
        <p class="tagline">${taglineLines.map((l,i) => l + (i < taglineLines.length-1 ? '<br>' : '')).join('')}</p>
      `;
      root.appendChild(hero);

      // ── Socials ──
      const socSection = document.createElement('section');
      socSection.className = 'socials';
      const sortedSocials = [...(cfg.socials || [])].sort((a,b) => a.order - b.order);
      sortedSocials.forEach(s => {
        const a = document.createElement('a');
        a.href = s.href;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 'social-btn';
        a.setAttribute('aria-label', s.label);
        a.innerHTML = (SOCIAL_ICONS[s.icon] || SOCIAL_ICONS.email) + `<span>${s.label}</span>`;
        socSection.appendChild(a);
      });
      root.appendChild(socSection);

      // ── Sections ──
      const sortedSections = [...(cfg.sections || [])].sort((a,b) => a.order - b.order);
      sortedSections.forEach(sec => {
        const section = document.createElement('section');
        section.className = 'section';

        const header = document.createElement('h2');
        header.className = 'section-label';
        header.textContent = sec.label;
        section.appendChild(header);

        const sortedCards = [...(sec.cards || [])].sort((a,b) => a.order - b.order);

        if (sec.type === 'promo') {
          const grid = document.createElement('div');
          grid.className = 'card-grid';
          sortedCards.forEach(c => {
            const a = document.createElement('a');
            a.href = c.href;
            a.target = '_blank';
            a.className = 'promo-card';
            a.innerHTML = `
              <div class="update-img-wrap"><img src="${c.image}" alt="${c.alt || c.label}"></div>
              <span class="card-label promo-caption">${c.label}</span>
              <span class="card-arrow-promo">${c.cta || 'VIEW'}</span>
            `;
            grid.appendChild(a);
          });
          section.appendChild(grid);

        } else if (sec.type === 'link') {
          const grid = document.createElement('div');
          grid.className = 'card-grid';
          sortedCards.forEach(c => {
            const a = document.createElement('a');
            a.href = c.href;
            a.target = '_blank';
            a.className = 'link-card resource-card';
            a.innerHTML = `
              <span class="card-icon">${c.icon || '🔗'}</span>
              <span class="card-label">${c.label}</span>
              <span class="card-arrow">→</span>
            `;
            grid.appendChild(a);
          });
          section.appendChild(grid);

        } else if (sec.type === 'info') {
          const grid = document.createElement('div');
          grid.className = 'card-grid card-grid--row';
          sortedCards.forEach(c => {
            // Support both legacy `image` (string) and new `images` (array)
            const imgs = normaliseImages(c);

            const div = document.createElement('div');
            div.className = 'link-card info-card';
            // Badge if multiple images
            if (imgs.length > 1) {
              div.innerHTML = `
                <span class="card-icon">${c.icon || '📄'}</span>
                <span class="card-label">${c.label}</span>
                <span class="info-card-count">${imgs.length}</span>
              `;
            } else {
              div.innerHTML = `
                <span class="card-icon">${c.icon || '📄'}</span>
                <span class="card-label">${c.label}</span>
              `;
            }

            div.addEventListener('click', () => {
              if (imgs.length > 0) Gallery.open(imgs, 0);
            });

            grid.appendChild(div);
          });
          section.appendChild(grid);

        } else if (sec.type === 'location') {
          const grid = document.createElement('div');
          grid.className = 'card-grid';
          sortedCards.forEach(c => {
            const a = document.createElement('a');
            a.href = c.href;
            a.target = '_blank';
            a.className = 'link-card location-card';
            a.innerHTML = `
              <span class="card-icon">${c.icon || '📍'}</span>
              <div class="location-card-body">
                <span class="location-label">${c.label}</span>
                <span class="location-address">${c.address || ''}</span>
              </div>
              <span class="card-arrow">→</span>
            `;
            grid.appendChild(a);
          });
          section.appendChild(grid);
        }

        root.appendChild(section);
      });

      // ── Footer ──
      const footer = document.createElement('footer');
      footer.innerHTML = `
        <button class="share-btn" id="shareBtn" aria-label="Share this page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          <span>Share</span>
        </button>
        <p>© ${new Date().getFullYear()} Bawz Complex. All rights reserved.</p>
      `;
      root.appendChild(footer);

      // ── Wire interactions ──
      wireCrazyMode(cfg);
      wireShare();
    }

    // ══════════════════════════════════════════════════════
    //  HELPERS
    // ══════════════════════════════════════════════════════
    function normaliseImages(card) {
      if (Array.isArray(card.images) && card.images.length > 0) {
        return card.images.filter(Boolean);
      }
      if (card.image) return [card.image];
      return [];
    }

    // ══════════════════════════════════════════════════════
    //  CRAZY MODE
    // ══════════════════════════════════════════════════════
    function wireCrazyMode(cfg) {
      const logo = document.getElementById('logo-img');
      if (!logo) return;

      const cm = cfg.crazyMode || {};
      const CLICK_THRESHOLD = cm.clickThreshold || 5;
      const HOVER_THRESHOLD = cm.hoverThresholdSeconds || 5;
      const CRAZY_MESSAGE   = cm.message   || 'GOODLUCK!';
      const CRAZY_IMAGE     = cm.imageAsset || '';

      let clickCount = 0, hoverTime = 0, hoverInterval, activated = false;

      function toggleChaos() {
        activated = !activated;
        if (activated) {
          logo.classList.add('crazy');
          const text = document.createElement('div');
          text.className = 'crazy-text';
          text.id = 'crazyText';
          text.innerHTML = `${CRAZY_MESSAGE}${CRAZY_IMAGE ? `<br><img src="${CRAZY_IMAGE}" class="crazy-img">` : ''}`;
          document.body.appendChild(text);
          for (let i = 0; i < 200; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.background = `hsl(${Math.random()*360},100%,50%)`;
            conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 5000);
          }
        } else {
          logo.classList.remove('crazy');
          const text = document.getElementById('crazyText');
          if (text) text.remove();
        }
      }

      logo.addEventListener('click', () => {
        clickCount++;
        if (!activated && clickCount >= CLICK_THRESHOLD) toggleChaos();
        else if (activated) toggleChaos();
      });

      logo.addEventListener('mouseenter', () => {
        hoverInterval = setInterval(() => {
          hoverTime++;
          if (!activated && hoverTime >= HOVER_THRESHOLD) { toggleChaos(); clearInterval(hoverInterval); }
        }, 1000);
      });

      logo.addEventListener('mouseleave', () => { clearInterval(hoverInterval); hoverTime = 0; });
    }

    // ══════════════════════════════════════════════════════
    //  SHARE
    // ══════════════════════════════════════════════════════
    function wireShare() {
      document.getElementById('shareBtn')?.addEventListener('click', async () => {
        const url = window.location.href;
        const shareData = { title: 'Bawz Complex', text: 'The home where communities grow and cultures connect.', url };
        if (navigator.share) { try { await navigator.share(shareData); } catch (_) {} }
        else {
          try { await navigator.clipboard.writeText(url); showToast(); }
          catch (_) {
            const ta = document.createElement('textarea');
            ta.value = url; ta.style.cssText = 'position:fixed;opacity:0';
            document.body.appendChild(ta); ta.select(); document.execCommand('copy');
            document.body.removeChild(ta); showToast();
          }
        }
      });
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ══════════════════════════════════════════════════════
    //  BOOT
    // ══════════════════════════════════════════════════════
    (async () => {
      try {
        const res = await fetch('https://bawz-complex-linktree-admin.onrender.com/api/config');
        const json = await res.json();
        buildSite(json.data);
      } catch (e) {
        console.warn('Could not load config from API, using fallback.', e);
        document.getElementById('site-root').innerHTML = `
          <header class="hero">
            <div class="logo-wrap"><div class="logo-box">
              <img src="assets/FLAT BAWZ WHITE.png" alt="Bawz Complex Logo" class="logo-img">
            </div></div>
            <p class="tagline">Welcome to Bawz Complex!</p>
          </header>
          <p style="text-align:center;color:rgba(255,255,255,0.4);font-size:12px">Could not connect to server.</p>
        `;
      }
    })();
    </script>
</body>
</html>
